<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Required - SnipLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="surface-card auth-card animate-up"
            style="box-shadow: 0 0 30px rgba(255, 159, 10, 0.05); border: 1px solid rgba(255, 159, 10, 0.2);">
            <div class="auth-header text-center">
                <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                    <span
                        style="display: flex; align-items: center; justify-content: center; width: 56px; height: 56px; background-color: rgba(255, 159, 10, 0.1); border-radius: 50%; color: var(--warning);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                </div>
                <h2 class="auth-title">Authentication Required</h2>
                <p class="auth-subtitle" style="margin-top: 0.5rem;">This destination URL is protected. Please provide
                    the access keyword to continue.</p>
            </div>

            <div id="alert"></div>

            <form id="passwordForm">
                <div style="margin-bottom: 2.5rem;">
                    <label for="password" class="form-label">Access Keyword</label>
                    <input type="password" id="password" class="form-input" required placeholder="Enter password"
                        style="background-color: rgba(0,0,0,0.2);">
                </div>
                <button type="submit" class="btn w-full"
                    style="background-color: var(--text-primary); color: var(--bg-base); padding: 0.875rem;">
                    Authenticate & Redirect
                </button>
            </form>

            <div class="auth-link" style="margin-top: 2rem;">
                <a href="/"
                    style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.8125rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Return to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const shortCode = urlParams.get('c');

        if (error === 'invalid') {
            showAlert('Authentication failed. Incorrect keyword provided.', 'error');
        }

        if (!shortCode) {
            window.location.href = '/';
        }

        document.getElementById('passwordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (!password) {
                showAlert('An access keyword is required.', 'error');
                return;
            }

            window.location.href = `/${shortCode}?password=${encodeURIComponent(password)}`;
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertDiv.innerHTML = '', 4000);
        }
    </script>
</body>

</html>
