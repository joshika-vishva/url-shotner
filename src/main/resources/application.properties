# Application Configuration
spring.application.name=SnipLink
server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
app.base-url=http://sniplink.local:8080

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:file:./data/sniplink_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.sniplink=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS Configuration
cors.allowed-origins=http://sniplink.local:8080,http://localhost:8080,http://localhost:3000

# Rate Limiting (requests per minute)
rate.limit.requests=100
rate.limit.duration=60000
