# Server Configuration
server.port=${PORT:8080}
app.base-url=${APP_BASE_URL:http://localhost:8080}
server.compression.enabled=true
server.http2.enabled=true

# Database Configuration (Production usually uses PostgreSQL)
# These will be overridden by environment variables in most cloud platforms
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/sniplink_db_prod}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.root=WARN
logging.level.com.sniplink=INFO

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://sniplink.local:8080,*}
